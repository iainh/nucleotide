<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Nucleotide application stack</title>
  <desc id="desc">A vertical flow diagram of the Nucleotide application layers. GPUI layers are yellow, Nucleotide layers are green, and Helix layers are purple.</desc>
  <defs>
    <style>
      .page-title { font: 800 32px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #071f52; letter-spacing: 0; }
      .page-subtitle { font: 500 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64708d; letter-spacing: 0; }
      .card-title { font: 800 23px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #071f52; letter-spacing: 0; }
      .card-subtitle { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #63708f; letter-spacing: 0; }
      .tier { font: 800 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.2px; }
      .source { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #75809a; letter-spacing: 0; }
      .arrow { stroke: #8d9aba; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .icon { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1000" height="1500" fill="#ffffff"/>

  <g transform="translate(500 64)" text-anchor="middle">
    <text class="page-title" x="0" y="0">Nucleotide Application Stack</text>
    <text class="page-subtitle" x="0" y="34">GPUI presentation, Nucleotide integration, Helix core services</text>
  </g>

  <g id="flow" transform="translate(0 116)">
    <g id="gpui-window" transform="translate(100 0)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#fffaf0" stroke="#d1a43a" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#b78012">GPUI</text>
      <g class="icon" stroke="#d4a11f" transform="translate(44 28)">
        <rect x="0" y="0" width="40" height="28" rx="5"/>
        <path d="M7 8h26"/>
        <path d="M14 38h12"/>
        <path d="M20 28v10"/>
      </g>
      <text class="card-title" x="150" y="42">Window, App, Render Tree</text>
      <text class="card-subtitle" x="150" y="72">Native windows, entities, focus, layout, painting</text>
    </g>

    <g transform="translate(500 104)">
      <path class="arrow" d="M0 0v34"/>
      <path class="arrow" d="M-13 22 0 35 13 22"/>
    </g>

    <g id="gpui-input" transform="translate(100 148)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#fffaf0" stroke="#d1a43a" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#b78012">GPUI</text>
      <g class="icon" stroke="#d4a11f" transform="translate(44 29)">
        <rect x="0" y="0" width="40" height="26" rx="6"/>
        <path d="M8 10h3M17 10h3M26 10h3M8 18h21"/>
        <path d="M20 26v12"/>
      </g>
      <text class="card-title" x="150" y="42">Input and Platform Events</text>
      <text class="card-subtitle" x="150" y="72">Keyboard, mouse, clipboard, window lifecycle</text>
    </g>

    <g transform="translate(500 252)">
      <path class="arrow" d="M0 0v34"/>
      <path class="arrow" d="M-13 22 0 35 13 22"/>
    </g>

    <g id="workspace" transform="translate(100 296)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#f2fbf5" stroke="#58b978" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#2f8d52">NUCLEOTIDE</text>
      <g class="icon" stroke="#2f9f5b" transform="translate(42 27)">
        <rect x="2" y="2" width="40" height="34" rx="6"/>
        <path d="M12 2v34"/>
        <path d="M20 12h14M20 22h14"/>
      </g>
      <text class="card-title" x="178" y="42">Workspace and Application Shell</text>
      <text class="card-subtitle" x="178" y="72">Root view, titlebar, file tree, overlays, tabs, splits</text>
    </g>

    <g transform="translate(500 400)">
      <path class="arrow" d="M0 0v34"/>
      <path class="arrow" d="M-13 22 0 35 13 22"/>
    </g>

    <g id="ui" transform="translate(100 444)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#f2fbf5" stroke="#58b978" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#2f8d52">NUCLEOTIDE</text>
      <g class="icon" stroke="#2f9f5b" transform="translate(42 29)">
        <rect x="0" y="0" width="18" height="18" rx="4"/>
        <rect x="26" y="0" width="18" height="18" rx="4"/>
        <rect x="0" y="26" width="18" height="18" rx="4"/>
        <rect x="26" y="26" width="18" height="18" rx="4"/>
      </g>
      <text class="card-title" x="178" y="42">nucleotide-ui</text>
      <text class="card-subtitle" x="178" y="72">Components, design tokens, providers, menus, popups</text>
    </g>

    <g transform="translate(500 548)">
      <path class="arrow" d="M0 0v34"/>
      <path class="arrow" d="M-13 22 0 35 13 22"/>
    </g>

    <g id="editor" transform="translate(100 592)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#f2fbf5" stroke="#58b978" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#2f8d52">NUCLEOTIDE</text>
      <g class="icon" stroke="#2f9f5b" transform="translate(42 28)">
        <path d="M4 5h38"/>
        <path d="M4 16h29"/>
        <path d="M4 27h35"/>
        <path d="M4 38h23"/>
        <path d="M42 4v36"/>
      </g>
      <text class="card-title" x="178" y="42">nucleotide-editor</text>
      <text class="card-subtitle" x="178" y="72">Document rendering, line layout, scroll state, views</text>
    </g>

    <g transform="translate(500 696)">
      <path class="arrow" d="M0 0v34"/>
      <path class="arrow" d="M-13 22 0 35 13 22"/>
    </g>

    <g id="core" transform="translate(100 740)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#f2fbf5" stroke="#58b978" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#2f8d52">NUCLEOTIDE</text>
      <g class="icon" stroke="#2f9f5b" transform="translate(42 28)">
        <circle cx="20" cy="20" r="16"/>
        <path d="M20 4v10M20 26v10M4 20h10M26 20h10"/>
        <path d="M9 9l7 7M31 9l-7 7M9 31l7-7M31 31l-7-7"/>
      </g>
      <text class="card-title" x="178" y="42">Core, Events, and Bridges</text>
      <text class="card-subtitle" x="178" y="72">Domain events, GPUI to Helix, Helix to GPUI</text>
    </g>

    <g transform="translate(500 844)">
      <path class="arrow" d="M0 0v34"/>
      <path class="arrow" d="M-13 22 0 35 13 22"/>
    </g>

    <g id="services" transform="translate(100 888)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#f2fbf5" stroke="#58b978" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#2f8d52">NUCLEOTIDE</text>
      <g class="icon" stroke="#2f9f5b" transform="translate(42 28)">
        <path d="M4 13h36"/>
        <path d="M4 27h36"/>
        <circle cx="12" cy="13" r="5"/>
        <circle cx="28" cy="27" r="5"/>
        <path d="M12 18v9h16"/>
      </g>
      <text class="card-title" x="178" y="42">Project, LSP, VCS, Env Services</text>
      <text class="card-subtitle" x="178" y="72">Project detection, language servers, git status, shell env</text>
    </g>

    <g transform="translate(500 992)">
      <path class="arrow" d="M0 0v34"/>
      <path class="arrow" d="M-13 22 0 35 13 22"/>
    </g>

    <g id="helix-core" transform="translate(100 1036)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#f8f4ff" stroke="#8c68db" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#7250bd">HELIX</text>
      <g class="icon" stroke="#7451c9" transform="translate(43 28)">
        <path d="M7 2h28l7 8v30H7z"/>
        <path d="M35 2v10h7"/>
        <path d="M15 18h18M15 29h18"/>
      </g>
      <text class="card-title" x="160" y="42">Helix Editor Core</text>
      <text class="card-subtitle" x="160" y="72">Documents, views, selections, commands, compositor</text>
    </g>

    <g transform="translate(500 1140)">
      <path class="arrow" d="M0 0v34"/>
      <path class="arrow" d="M-13 22 0 35 13 22"/>
    </g>

    <g id="helix-runtime" transform="translate(100 1184)">
      <rect x="0" y="0" width="800" height="92" rx="22" fill="#f8f4ff" stroke="#8c68db" stroke-width="2"/>
      <text class="tier" x="104" y="26" fill="#7250bd">HELIX</text>
      <g class="icon" stroke="#7451c9" transform="translate(43 27)">
        <path d="M22 2 6 10v18l16 10 16-10V10z"/>
        <path d="M6 10l16 10 16-10"/>
        <path d="M22 20v18"/>
      </g>
      <text class="card-title" x="160" y="42">Helix Runtime and Extensions</text>
      <text class="card-subtitle" x="160" y="72">Syntax, themes, language config, LSP registry</text>
    </g>
  </g>

  <text class="source" x="500" y="1472" text-anchor="middle">Source alignment: docs/event_system.md, docs/view_hierarchy.md, nucleotide-core, nucleotide-editor, nucleotide-ui.</text>
</svg>
