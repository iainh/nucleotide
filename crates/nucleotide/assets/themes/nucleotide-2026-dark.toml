# Nucleotide 2026 Dark Theme
# Author: Nucleotide contributors
# License: MPL-2.0
# Compatibility: This theme was created for Nucleotide but is fully compatible with Helix.
#
# Source palette and token colors:
# https://github.com/microsoft/vscode/blob/main/extensions/theme-defaults/themes/2026-dark.json

attribute = "constant_blue"
keyword = "keyword_red"
"keyword.directive" = "keyword_red"
namespace = "constant_blue"
punctuation = "text_soft"
"punctuation.delimiter" = "text_soft"
operator = "text_soft"
special = "entity_orange"
"variable.other.member" = "text_soft"
variable = "entity_orange"
"variable.other" = "text_soft"
"variable.parameter" = { fg = "text_soft" }
"variable.builtin" = "constant_blue"
type = "entity_orange"
"type.builtin" = "constant_blue"
"type.parameter" = "text_soft"
constructor = "entity_orange"
function = "function_purple"
"function.macro" = "constant_blue"
"function.builtin" = "constant_blue"
tag = "tag_green"
comment = "comment"
"comment.block.documentation" = "comment"
"comment.line.documentation" = "comment"
constant = "constant_blue"
"constant.builtin" = "constant_blue"
"constant.numeric" = "constant_blue"
"constant.character" = "keyword_red"
"constant.character.escape" = { fg = "tag_green", modifiers = ["bold"] }
string = "string_blue"
"string.regexp" = "string_blue"
"string.special.url" = { fg = "link", modifiers = ["underlined"] }
label = "constant_blue"
module = "constant_blue"
tabstop = { modifiers = ["italic"], bg = "panel" }

"markup.heading" = { fg = "constant_blue", modifiers = ["bold"] }
"markup.bold" = { fg = "text_soft", modifiers = ["bold"] }
"markup.italic" = { fg = "text_soft", modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link.url" = { fg = "link", modifiers = ["underlined"] }
"markup.link.text" = "string_blue"
"markup.raw" = "constant_blue"
"markup.quote" = "tag_green"
"markup.list" = "entity_orange"
"markup.normal.completion" = "text_soft"
"markup.normal.hover" = "text_soft"

"diff.plus" = "vcs_added"
"diff.minus" = "vcs_deleted"
"diff.delta" = "vcs_modified"

"ui.background" = { fg = "editor_fg", bg = "editor_bg" }
"ui.background.separator" = { fg = "border", bg = "border" }
"ui.linenr" = { fg = "line_number", bg = "editor_bg" }
"ui.linenr.selected" = { fg = "editor_fg", bg = "editor_bg" }
"ui.gutter" = { bg = "editor_bg" }
"ui.gutter.selected" = { bg = "line_highlight" }
"ui.statusline" = { fg = "muted", bg = "chrome" }
"ui.statusline.inactive" = { fg = "muted", bg = "chrome" }
"ui.bufferline" = { fg = "muted", bg = "chrome" }
"ui.bufferline.active" = { fg = "foreground", bg = "editor_bg" }
"ui.bufferline.inactive" = { fg = "muted", bg = "chrome" }
"ui.popup" = { fg = "foreground", bg = "panel" }
"ui.window" = { fg = "border", bg = "chrome" }
"ui.help" = { fg = "white", bg = "button" }
"ui.text" = { fg = "foreground" }
"ui.text.focus" = { fg = "white" }
"ui.text.inactive" = "muted"
"ui.text.directory" = { fg = "link" }
"ui.virtual" = { fg = "muted" }
"ui.virtual.ruler" = { bg = "panel" }
"ui.virtual.jump-label" = { fg = "error", modifiers = ["bold"] }
"ui.virtual.indent-guide" = { fg = "indent_guide" }
"ui.virtual.inlay-hint" = { fg = "muted" }
"ui.virtual.inlay-hint.parameter" = { fg = "muted" }
"ui.virtual.inlay-hint.type" = { fg = "muted" }

"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }
"ui.cursor.select" = { bg = "bracket_match" }
"ui.cursor.insert" = { bg = "editor_fg" }
"ui.cursor.primary.select" = { bg = "bracket_match" }
"ui.cursor.primary.insert" = { bg = "editor_fg" }
"ui.cursor.match" = { fg = "editor_bg", bg = "bracket_match" }
"ui.cursor" = { modifiers = ["reversed"] }
"ui.cursorline.primary" = { bg = "line_highlight" }
"ui.highlight" = { bg = "line_highlight" }
"ui.highlight.frameline" = { bg = "panel" }
"ui.highlight.search" = { fg = "foreground", bg = "selection" }
"ui.highlight.search.current" = { fg = "foreground", bg = "find_match" }
"ui.debug" = { fg = "link_active" }
"ui.debug.breakpoint" = { fg = "error" }
"ui.menu" = { fg = "foreground", bg = "panel" }
"ui.menu.selected" = { fg = "white", bg = "button" }
"ui.menu.scroll" = { fg = "foreground", bg = "border_strong" }
"ui.menu.separator" = { fg = "border", bg = "border" }
"ui.focus" = { fg = "focus", bg = "focus" }

"diagnostic.hint" = { underline = { color = "muted", style = "curl" } }
"diagnostic.info" = { underline = { color = "info", style = "curl" } }
"diagnostic.warning" = { underline = { color = "warning", style = "curl" } }
"diagnostic.error" = { underline = { color = "error", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

warning = "warning"
error = "error"
info = "info"
hint = "muted"

rainbow = [
  "keyword_red",
  "entity_orange",
  "tag_green",
  "constant_blue",
  "function_purple",
  "string_blue",
]

[palette]
# VS Code 2026 Dark editor and chrome surfaces.
editor_bg = "#121314"
chrome = "#191A1B"
panel = "#202122"
panel_high = "#242526"
field = "#191A1B"
line_highlight = "#242526"
border = "#2A2B2C"
border_strong = "#333536"
command_border = "#2E3031"
selection = "#276782"
find_match = "#276782"
bracket_match = "#3994BC"
focus = "#3994BC"

# Foreground and neutral roles.
white = "#FFFFFF"
foreground = "#bfbfbf"
editor_fg = "#BBBEBF"
text_soft = "#c9d1d9"
muted = "#8C8C8C"
disabled = "#555555"
comment = "#8b949e"
line_number = "#858889"
indent_guide = "#838485"

# VS Code 2026 Dark accents and TextMate token colors.
button = "#297AA0"
button_hover = "#2B7DA3"
link = "#48A0C7"
link_active = "#53A5CA"
info = "#3a94bc"
keyword_red = "#ff7b72"
constant_blue = "#79c0ff"
entity_orange = "#ffa657"
function_purple = "#d2a8ff"
tag_green = "#7ee787"
string_blue = "#a5d6ff"
invalid = "#ffa198"

# Diagnostics, VCS, and diff colors.
error = "#f48771"
warning = "#e5ba7d"
vcs_added = "#73c991"
vcs_modified = "#e5ba7d"
vcs_deleted = "#f48771"
gutter_added = "#72C892"
gutter_deleted = "#F28772"
