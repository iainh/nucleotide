# Nucleotide Teal Theme - A WCAG-compliant teal variant of the default Helix theme
# Author: Nucleotide contributors
# License: MPL-2.0
# Compatibility: This theme was created for Nucleotide but is fully compatible with Helix
#
# Based on the default purple theme but with teal as the dominant color
# Features WCAG AA compliant contrast ratios for accessibility

attribute = "link"
keyword = "amber"
"keyword.directive" = "aqua" # -- preprocessor comments (#if in C)
namespace = "link"
punctuation = "muted_mid"
"punctuation.delimiter" = "muted_mid"
operator = "ink"
special = "gold"
"variable.other.member" = "white"
variable = "ink"
# "variable.parameter" = { fg = "ink", modifiers = ["underlined"] }
"variable.parameter" = { fg = "ink" }
"variable.builtin" = "aqua"
type = "white"
"type.builtin" = "aqua"
constructor = "aqua"
function = "white"
"function.macro" = "link"
"function.builtin" = "white"
tag = "amber"
comment = "comment"
constant = "aqua"
"constant.builtin" = "aqua"
string = "sage"
"constant.numeric" = "link"
"constant.character.escape" = "coral"
# used for lifetimes
label = "link"
tabstop = { modifiers = ["italic"], bg = "panel" }

"markup.heading" = "link"
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link.url" = { fg = "link", modifiers = ["underlined"] }
"markup.link.text" = "amber"
"markup.raw" = "amber"

"diff.plus" = "sage"
"diff.minus" = "coral"
"diff.delta" = "link"

"comment.block.documentation" = { fg = "muted_mid", modifiers = ["italic"] }
"comment.line.documentation" = { fg = "muted_mid", modifiers = ["italic"] }
# concat (ERROR) @error.syntax and "MISSING ;" selectors for errors

"ui.background" = { bg = "base" }
"ui.background.separator" = { fg = "separator" }
"ui.linenr" = { fg = "gutter_fg" }
"ui.linenr.selected" = { fg = "link" }
"ui.statusline" = { fg = "ink", bg = "base" }
"ui.statusline.inactive" = { fg = "muted_mid", bg = "base" }
"ui.popup" = { bg = "panel" }
"ui.window" = { fg = "separator" }
"ui.help" = { bg = "link", fg = "base" }
"ui.text" = { fg = "ink" }
"ui.text.focus" = { fg = "white" }
"ui.text.inactive" = "comment"
"ui.text.directory" = { fg = "link" }
"ui.virtual" = { fg = "gutter_fg" }
"ui.virtual.ruler" = { bg = "panel" }
"ui.virtual.jump-label" = { fg = "coral", modifiers = ["bold"] }

"ui.virtual.indent-guide" = { fg = "indent" }
"ui.virtual.inlay-hint" = { fg = "muted_mid" }
"ui.virtual.inlay-hint.parameter" = { fg = "muted_mid" }
"ui.virtual.inlay-hint.type" = { fg = "muted_mid" }

"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }
"ui.cursor.select" = { bg = "matched" }
"ui.cursor.insert" = { bg = "white" }
"ui.cursor.primary.select" = { bg = "matched" }
"ui.cursor.primary.insert" = { bg = "white" }
"ui.cursor.match" = { fg = "base", bg = "matched" }
"ui.cursor" = { modifiers = ["reversed"] }
"ui.cursorline.primary" = { bg = "caret_row" }
"ui.highlight" = { bg = "caret_row" }
"ui.highlight.frameline" = { bg = "folded_bg" }
"ui.debug" = { fg = "link" }
"ui.debug.breakpoint" = { fg = "coral" }
"ui.menu" = { fg = "ink", bg = "panel" }
"ui.menu.selected" = { fg = "base", bg = "link" }
"ui.menu.scroll" = { fg = "ink", bg = "gutter_fg" }

"diagnostic.hint" = { underline = { color = "muted_mid", style = "curl" } }
"diagnostic.info" = { underline = { color = "gold", style = "curl" } }
"diagnostic.warning" = { underline = { color = "warn", style = "curl" } }
"diagnostic.error" = { underline = { color = "error", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

warning = "warn"
error = "error"
info = "gold"
hint = "muted_mid"

[palette]
# Teal palette with dark-purple-style role separation.

# Backgrounds and surfaces
base = "#102423"
gutter_bg = "#132927"
caret_row = "#112726"
panel = "#183432"
separator = "#2f5854"
separator_selected = "#47736f"
indent = "#274743"
indent_selected = "#315650"
folded_bg = "#1d4b52"
selection = "#21423f"
matched = "#3b6864"

# Text
white = "#ffffff"
ink = "#c8d2d5"
comment = "#6f8584"
muted_mid = "#95a7a8"
gutter_fg = "#5f7473"

# Accents
aqua = "#67e8d1"
link = "#4fc3c7"
sage = "#93d6ac"
amber = "#d6ad63"
gold = "#c6a95f"
coral = "#f07868"
error = "#dd5f59"
warn = "#c89424"
