[package]
name = "helix-view"
description = "UI abstractions for use in backends"
version = "25.7.1"
authors = ["Blaz Hrastnik <blaz@mxxn.io>"]
edition = "2021"
license = "MPL-2.0"
rust-version = "1.90"
categories = ["editor"]
repository = "https://github.com/helix-editor/helix"
homepage = "https://helix-editor.com"

[package.metadata.cargo-udeps.ignore]
# These are exercised by the feature-gated benchmark target below. They are
# false positives when cargo-udeps checks every target in this workspace.
development = ["criterion", "helix-tui"]

[lib]
# Skip libtest benchmark harness, the benches use criterion.
# cargo bench -p helix-view --features bench
bench = false

[features]
default = []
term = ["termina", "crossterm"]
unicode-lines = []
# Exposes internals. Should not be enabled except for benchmarking.
bench = []

[dependencies]
helix-stdx = { path = "../helix-stdx" }
helix-core.workspace = true
helix-event.workspace = true
helix-loader.workspace = true
helix-lsp.workspace = true
helix-dap.workspace = true
helix-vcs.workspace = true

bitflags = "2.12"
foldhash = "0.2"
anyhow = "1"
termina = { version = "0.3", optional = true }

tempfile = "3.27.0"

# Conversion traits
once_cell = "1.21"

arc-swap = "1.9"

tokio = { version = "1", features = ["rt", "rt-multi-thread", "io-util", "io-std", "time", "process", "macros", "fs", "parking_lot"] }
tokio-stream = "0.1"
futures-util = { version = "0.3", features = ["std", "async-await"], default-features = false }

slotmap = "1.1.1"

chardetng = "1.0"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1"
log = "~0.4"

parking_lot = "0.12"
thiserror = "2.0"

kstring = "2.0"

[target.'cfg(windows)'.dependencies]
clipboard-win = { version = "5.4", features = ["std"] }
crossterm = { version = "0.28", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
rustix = { version = "1.1", features = ["fs"] }

[dev-dependencies]
helix-tui.workspace = true
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
quickcheck = { version = "1", default-features = false }

[[bench]]
name = "word_index"
harness = false
required-features = ["bench"]
