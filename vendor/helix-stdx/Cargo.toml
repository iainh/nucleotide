[package]
name = "helix-stdx"
description = "Standard library extensions"
include = ["src/**/*", "README.md"]
version = "25.7.1"
authors = ["Blaz Hrastnik <blaz@mxxn.io>"]
edition = "2021"
license = "MPL-2.0"
rust-version = "1.90"
categories = ["editor"]
repository = "https://github.com/helix-editor/helix"
homepage = "https://helix-editor.com"

[dependencies]
dunce = "1.0"
etcetera = "0.11"
ropey = { version = "1.6.1", default-features = false, features = ["simd"] }
which = "8.0"
regex-cursor = "0.1.5"
bitflags = "2.12"
once_cell = "1.21"
regex-automata = "0.4.14"
unicode-segmentation = "1.13"
serde = { version = "1.0", features = ["derive"] }
percent-encoding = "2.3"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_Security", "Win32_Security_Authorization", "Win32_Storage_FileSystem", "Win32_System_Threading"] }

[target.'cfg(unix)'.dependencies]
rustix = { version = "1.1", features = ["fs", "thread"] }

[dev-dependencies]
tempfile = "3.27.0"
serde_json = "1.0"
