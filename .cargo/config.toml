[build]
# Enable tokio_unstable for helix-event crate
rustflags = ["--cfg", "tokio_unstable"]

[env]
# Helix's helix-term build script fetches every tree-sitter grammar by default.
# Nucleotide manages runtime grammars separately, so keep Cargo builds offline
# from grammar repository availability.
HELIX_DISABLE_AUTO_GRAMMAR_BUILD = "1"

# Windows targets
[target.x86_64-pc-windows-msvc]
rustflags = ["--cfg", "tokio_unstable", "-C", "link-arg=/stack:10000000"]

[target.x86_64-pc-windows-gnu]
rustflags = ["--cfg", "tokio_unstable", "-C", "link-arg=-Wl,--stack,10000000"]
