name: Build for macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-remote-helpers:
    name: Build Linux remote helpers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839

      - name: Build Linux remote helpers
        run: nix develop --command build-remote-helpers

      - name: Upload Linux remote helpers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-remote-helpers
          path: target/remote-helpers/nucleotide-remote-linux-*
          retention-days: 7

  build:
    name: Build macOS app
    runs-on: macos-latest
    needs: build-linux-remote-helpers
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download Linux remote helpers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: linux-remote-helpers
          path: target/remote-helpers

      - name: Verify Linux remote helpers
        run: |
          test -f target/remote-helpers/nucleotide-remote-linux-x86_64
          test -f target/remote-helpers/nucleotide-remote-linux-aarch64
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: ${{ matrix.arch == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2
      
      - name: Cache cargo dependencies
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-
      
      - name: Build release binary
        run: |
          TARGET=${{ matrix.arch == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}
          cargo build --release --target $TARGET
      
      - name: Prepare runtime files
        run: |
          # Clone helix to get runtime files
          git clone --depth 1 --branch 25.07.1 https://github.com/helix-editor/helix.git helix-temp
          
          # Create runtime directory
          mkdir -p runtime
          cp -r helix-temp/runtime/* runtime/
          
          # Clean up
          rm -rf helix-temp
          
          echo "Runtime files prepared:"
          ls -la runtime/ | head -20
      
      - name: Create macOS app bundle
        run: |
          # Use the bundle script
          chmod +x scripts/bundle-mac.sh
          TARGET=${{ matrix.arch == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}
          NUCL_REMOTE_HELPER_DIR="target/remote-helpers" \
            NUCL_REQUIRE_REMOTE_HELPERS=1 \
            NUCL_BINARY="target/$TARGET/release/nucl" \
            ./scripts/bundle-mac.sh
          
          # Verify the app bundle
          if [ -d "Nucleotide.app" ]; then
            echo "✓ App bundle created successfully"
            echo "App bundle contents:"
            ls -la Nucleotide.app/Contents/
            ls -la Nucleotide.app/Contents/MacOS/
            test -x Nucleotide.app/Contents/MacOS/nucleotide-remote-linux-x86_64
            test -x Nucleotide.app/Contents/MacOS/nucleotide-remote-linux-aarch64
            
            # Check if runtime is included
            if [ -d "Nucleotide.app/Contents/MacOS/runtime" ]; then
              echo "✓ Runtime files included"
              echo "  Themes: $(find Nucleotide.app/Contents/MacOS/runtime/themes -name "*.toml" 2>/dev/null | wc -l)"
              echo "  Languages: $(find Nucleotide.app/Contents/MacOS/runtime/queries -mindepth 1 -type d 2>/dev/null | wc -l)"
            fi
          else
            echo "✗ App bundle not created!"
            exit 1
          fi
      
      - name: Create DMG
        run: |
          # Create a simple DMG
          mkdir -p dmg-content
          cp -r Nucleotide.app dmg-content/
          
          # Create Applications symlink
          ln -s /Applications dmg-content/Applications
          
          # Create DMG
          hdiutil create -volname "Nucleotide" -srcfolder dmg-content -ov -format UDZO Nucleotide-${{ matrix.arch }}.dmg
          
          echo "DMG created:"
          ls -lh Nucleotide-${{ matrix.arch }}.dmg
          
          # Clean up
          rm -rf dmg-content
      
      - name: Upload DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nucleotide-macos-${{ matrix.arch }}
          path: Nucleotide-${{ matrix.arch }}.dmg
          retention-days: 7

  build-universal:
    name: Build Universal macOS app
    runs-on: macos-latest
    needs: build
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Download x86_64 artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: nucleotide-macos-x86_64
          path: x86_64
      
      - name: Download aarch64 artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: nucleotide-macos-aarch64
          path: aarch64
      
      - name: Extract apps
        run: |
          # Mount and extract x86_64
          hdiutil attach x86_64/Nucleotide-x86_64.dmg -mountpoint /tmp/x86_64-mount
          cp -r /tmp/x86_64-mount/Nucleotide.app ./Nucleotide-x86_64.app
          hdiutil detach /tmp/x86_64-mount
          
          # Mount and extract aarch64
          hdiutil attach aarch64/Nucleotide-aarch64.dmg -mountpoint /tmp/aarch64-mount
          cp -r /tmp/aarch64-mount/Nucleotide.app ./Nucleotide-aarch64.app
          hdiutil detach /tmp/aarch64-mount
      
      - name: Create universal binary
        run: |
          # Debug: List extracted apps
          echo "Listing current directory:"
          ls -la
          echo "Checking x86_64 app:"
          ls -la Nucleotide-x86_64.app/Contents/MacOS/ || echo "x86_64 app not found"
          echo "Checking aarch64 app:"
          ls -la Nucleotide-aarch64.app/Contents/MacOS/ || echo "aarch64 app not found"
          
          # Verify the binary exists with correct name
          echo "Verifying binaries exist:"
          test -f Nucleotide-x86_64.app/Contents/MacOS/Nucleotide && echo "✓ x86_64 binary found" || echo "✗ x86_64 binary missing"
          test -f Nucleotide-aarch64.app/Contents/MacOS/Nucleotide && echo "✓ aarch64 binary found" || echo "✗ aarch64 binary missing"
          
          # Create universal app
          cp -r Nucleotide-aarch64.app Nucleotide-Universal.app
          
          # Create universal binary using lipo
          lipo -create \
            Nucleotide-x86_64.app/Contents/MacOS/Nucleotide \
            Nucleotide-aarch64.app/Contents/MacOS/Nucleotide \
            -output Nucleotide-Universal.app/Contents/MacOS/Nucleotide
          test -x Nucleotide-Universal.app/Contents/MacOS/nucleotide-remote-linux-x86_64
          test -x Nucleotide-Universal.app/Contents/MacOS/nucleotide-remote-linux-aarch64
          
          # Verify universal binary
          echo "Universal binary created:"
          file Nucleotide-Universal.app/Contents/MacOS/Nucleotide
          lipo -info Nucleotide-Universal.app/Contents/MacOS/Nucleotide
      
      - name: Create Universal DMG
        run: |
          # Create DMG content
          mkdir -p dmg-content
          cp -r Nucleotide-Universal.app dmg-content/Nucleotide.app
          ln -s /Applications dmg-content/Applications
          
          # Create DMG
          hdiutil create -volname "Nucleotide" -srcfolder dmg-content -ov -format UDZO Nucleotide-universal.dmg
          
          echo "Universal DMG created:"
          ls -lh Nucleotide-universal.dmg
      
      - name: Upload Universal DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nucleotide-macos-universal
          path: Nucleotide-universal.dmg
          retention-days: 7

  build-with-nix:
    name: Build with Nix on macOS (using GitHub cache)
    runs-on: macos-latest
    needs: build-linux-remote-helpers
    continue-on-error: true  # Optional build - don't fail the whole workflow
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download Linux remote helpers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: linux-remote-helpers
          path: target/remote-helpers
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839
      
      - name: Build with Nix
        run: |
          # Build runtime files
          nix build .#runtime --print-build-logs
          
          # Build in Nix shell
          nix develop --command cargo build --release
          
          # Test the result
          if [ -f "target/release/nucl" ]; then
            echo "✓ Binary created successfully"
            file target/release/nucl
          else
            echo "✗ Binary not found!"
            exit 1
          fi
      
      - name: Create Nix app bundle
        run: |
          # Run the Nix-based bundle command
          NUCL_REMOTE_HELPER_DIR="target/remote-helpers" \
            NUCL_REQUIRE_REMOTE_HELPERS=1 \
            nix develop --command make-macos-bundle
          
          # Verify the app
          if [ -d "Nucleotide.app" ]; then
            echo "✓ Nix app bundle created"
            test -x Nucleotide.app/Contents/MacOS/nucleotide-remote-linux-x86_64
            test -x Nucleotide.app/Contents/MacOS/nucleotide-remote-linux-aarch64
            
            # Create DMG
            mkdir -p dmg-content
            cp -r Nucleotide.app dmg-content/
            ln -s /Applications dmg-content/Applications
            hdiutil create -volname "Nucleotide" -srcfolder dmg-content -ov -format UDZO Nucleotide-nix.dmg
            
            echo "Nix DMG created:"
            ls -lh Nucleotide-nix.dmg
          fi
      
      - name: Upload Nix DMG
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nucleotide-macos-nix
          path: Nucleotide-nix.dmg
          retention-days: 7
