name: Build for Linux

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Linux binary
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            libfreetype6-dev \
            libfontconfig1-dev
      
      - name: Cache cargo dependencies
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build release binary
        run: |
          cargo build --release -p nucleotide --bins -p nucleotide-remote
          nix develop --command build-remote-helpers
      
      - name: Prepare runtime files
        run: |
          # Fetch the Cargo-pinned Helix revision for runtime files.
          HELIX_REV="$(sed -n 's/.*helix-loader = .*rev = "\([0-9a-f]*\)".*/\1/p' Cargo.toml | head -n 1)"
          test -n "${HELIX_REV}"
          git init helix-temp
          git -C helix-temp remote add origin https://github.com/helix-editor/helix.git
          git -C helix-temp fetch --depth 1 origin "${HELIX_REV}"
          git -C helix-temp checkout --detach FETCH_HEAD
          
          # Create distribution structure
          mkdir -p dist/bin
          mkdir -p dist/share/nucl/runtime
          
          # Copy binary
          cp target/release/nucl dist/bin/
          cp target/release/nucleotide-remote dist/bin/
          cp target/remote-helpers/nucleotide-remote-linux-x86_64 dist/bin/
          cp target/remote-helpers/nucleotide-remote-linux-aarch64 dist/bin/
          
          # Copy runtime files from helix
          cp -r helix-temp/runtime/* dist/share/nucl/runtime/
          
          # Clean up
          rm -rf helix-temp
          
          echo "Distribution structure created:"
          ls -la dist/
          ls -la dist/share/nucl/runtime/ | head -20
      
      - name: Test binary launch
        run: |
          # Set runtime path
          export HELIX_RUNTIME="$(pwd)/dist/share/nucl/runtime"
          
          # Basic smoke test - check if binary runs and shows version
          ./dist/bin/nucl --version || true
          ./dist/bin/nucleotide-remote version --json
      
      - name: Create distribution package
        run: |
          # Create tarball with proper structure
          cd dist
          tar czf ../nucleotide-linux-x86_64.tar.gz *
          cd ..
          
          echo "Distribution package created:"
          ls -lh nucleotide-linux-x86_64.tar.gz
      
      - name: Upload distribution package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nucleotide-linux-x86_64
          path: nucleotide-linux-x86_64.tar.gz
          retention-days: 7

  build-with-nix:
    name: Build with Nix (using GitHub cache)
    runs-on: ubuntu-latest
    continue-on-error: true  # Optional build - don't fail the whole workflow
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839
      
      - name: Build with Nix
        run: |
          # Build runtime files
          nix build .#runtime --print-build-logs
          
          # Build in Nix shell
          nix develop --command cargo build --release
          
          # Test the result
          if [ -f "target/release/nucl" ]; then
            echo "✓ Binary created successfully"
            file target/release/nucl
          else
            echo "✗ Binary not found!"
            exit 1
          fi
      
      - name: Create Nix distribution
        run: |
          # Create distribution using Nix helper
          nix develop --command make-linux-package
          
          echo "Nix distribution package created:"
          ls -lh nucleotide-linux.tar.gz
      
      - name: Upload Nix package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nucleotide-nix-linux-x86_64
          path: nucleotide-linux.tar.gz
          retention-days: 7
