name: Build for Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.95.0

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: windows-x86_64-release
          cache-workspace-crates: true

      - name: Build release binary
        run: cargo build --release -p nucleotide --bins

      - name: Prepare bundled runtime
        shell: pwsh
        run: |
          .\scripts\clone-helix-runtime.ps1 -Destination helix-temp
          try {
            .\scripts\setup-windows-runtime.ps1 -RuntimeSource helix-temp\runtime -NuclExe target\release\nucl-grammar.exe -AllowGrammarFailures
          } finally {
            Remove-Item -LiteralPath helix-temp -Recurse -Force
          }

      - name: Verify grammar DLLs
        shell: pwsh
        run: |
          $grammarDlls = Get-ChildItem `
            -Path crates\nucleotide\runtime\grammars `
            -Filter *.dll `
            -File

          if ($grammarDlls.Count -eq 0) {
            throw "Windows package runtime does not contain any grammar DLLs."
          }

          Write-Host "Windows package runtime contains $($grammarDlls.Count) grammar DLL(s)."

          $grammarSources = "crates\nucleotide\runtime\grammars\sources"
          if (Test-Path $grammarSources) {
            throw "Windows package runtime must not contain grammar sources: $grammarSources"
          }
