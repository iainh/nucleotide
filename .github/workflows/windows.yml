name: Build for Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-remote-helpers:
    name: Build Linux remote helpers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839

      - name: Build Linux remote helpers
        run: nix develop --command build-remote-helpers

      - name: Upload Linux remote helpers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-remote-helpers
          path: target/remote-helpers/nucleotide-remote-linux-*
          retention-days: 7

  build:
    name: Build Windows installer
    runs-on: windows-latest
    needs: build-linux-remote-helpers

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download Linux remote helpers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: linux-remote-helpers
          path: target/remote-helpers

      - name: Verify Linux remote helpers
        shell: pwsh
        run: |
          foreach ($helper in @("nucleotide-remote-linux-x86_64", "nucleotide-remote-linux-aarch64")) {
            $path = Join-Path "target\remote-helpers" $helper
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Linux remote helper not found: $path"
            }
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Install .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 8.0.x

      - name: Cache cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p nucleotide --bins

      - name: Prepare bundled runtime
        shell: pwsh
        run: |
          .\scripts\clone-helix-runtime.ps1 -Destination helix-temp
          try {
            .\scripts\setup-windows-runtime.ps1 -RuntimeSource helix-temp\runtime -NuclExe target\release\nucl-grammar.exe -AllowGrammarFailures
          } finally {
            Remove-Item -LiteralPath helix-temp -Recurse -Force
          }

      - name: Verify grammar DLLs
        shell: pwsh
        run: |
          $grammarDlls = Get-ChildItem `
            -Path crates\nucleotide\runtime\grammars `
            -Filter *.dll `
            -File

          if ($grammarDlls.Count -eq 0) {
            throw "Windows installer runtime does not contain any grammar DLLs."
          }

          Write-Host "Windows installer runtime contains $($grammarDlls.Count) grammar DLL(s)."

          $grammarSources = "crates\nucleotide\runtime\grammars\sources"
          if (Test-Path $grammarSources) {
            throw "Windows installer runtime must not contain grammar sources: $grammarSources"
          }

      - name: Build Windows MSI
        shell: pwsh
        run: |
          .\scripts\build-windows-msi.ps1 -RequireRemoteHelpers

          $installer = "target\release\bundle\wxsmsi\bin\Release\nucleotide.msi"
          if (-not (Test-Path $installer)) {
            throw "Windows installer not found: $installer"
          }

          Copy-Item -LiteralPath $installer -Destination Nucleotide-windows-x86_64.msi -Force
          Get-Item Nucleotide-windows-x86_64.msi

      - name: Verify MSI payload
        shell: pwsh
        run: |
          $extractDir = Join-Path $PWD "dist\windows-msi"
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null

          $installer = (Resolve-Path "Nucleotide-windows-x86_64.msi").Path
          $process = Start-Process `
            -FilePath msiexec.exe `
            -ArgumentList @("/a", $installer, "/qn", "TARGETDIR=$extractDir") `
            -Wait `
            -PassThru

          if ($process.ExitCode -ne 0) {
            throw "Administrative MSI extraction failed with exit code $($process.ExitCode)."
          }

          $runtime = Get-ChildItem -Path $extractDir -Recurse -Directory -Filter runtime |
            Select-Object -First 1
          if (-not $runtime) {
            throw "Extracted MSI does not contain a runtime directory."
          }

          $languages = Join-Path $runtime.FullName "languages.toml"
          if (-not (Test-Path -LiteralPath $languages -PathType Leaf)) {
            throw "Extracted MSI runtime does not contain languages.toml."
          }

          $queries = Join-Path $runtime.FullName "queries"
          if (-not (Test-Path -LiteralPath $queries -PathType Container)) {
            throw "Extracted MSI runtime does not contain a queries directory."
          }

          $queryDirs = Get-ChildItem -Path $queries -Directory
          if ($queryDirs.Count -eq 0) {
            throw "Extracted MSI runtime queries directory is empty."
          }

          $grammarDlls = Get-ChildItem -Path (Join-Path $runtime.FullName "grammars") -Filter *.dll -File
          if ($grammarDlls.Count -eq 0) {
            throw "Extracted MSI runtime does not contain any grammar DLLs."
          }

          $exe = Get-ChildItem -Path $extractDir -Recurse -Filter nucl.exe -File |
            Select-Object -First 1
          if (-not $exe) {
            throw "Extracted MSI does not contain nucl.exe."
          }

          $ghosttyDll = Get-ChildItem -Path $extractDir -Recurse -Filter ghostty-vt.dll -File |
            Select-Object -First 1
          if (-not $ghosttyDll) {
            throw "Extracted MSI does not contain ghostty-vt.dll."
          }

          foreach ($helper in @("nucleotide-remote-linux-x86_64", "nucleotide-remote-linux-aarch64")) {
            $installed = Get-ChildItem -Path $extractDir -Recurse -Filter $helper -File |
              Select-Object -First 1
            if (-not $installed) {
              throw "Extracted MSI does not contain $helper."
            }
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nucleotide-windows-x86_64
          path: Nucleotide-windows-x86_64.msi
          retention-days: 7
