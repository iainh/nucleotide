name: Build for Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Windows package
        shell: pwsh
        run: |
          .\scripts\package-windows-test.ps1 `
            -Release `
            -Clean `
            -OutputDir dist\nucleotide-windows-x86_64

      - name: Verify grammar DLLs
        shell: pwsh
        run: |
          $grammarDlls = Get-ChildItem `
            -Path dist\nucleotide-windows-x86_64\runtime\grammars `
            -Filter *.dll `
            -File

          if ($grammarDlls.Count -eq 0) {
            throw "Windows package does not contain any grammar DLLs."
          }

          Write-Host "Windows package contains $($grammarDlls.Count) grammar DLL(s)."

      - name: Create Windows zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\nucleotide-windows-x86_64\* `
            -DestinationPath nucleotide-windows-x86_64.zip `
            -Force

          Get-Item nucleotide-windows-x86_64.zip

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: nucleotide-windows-x86_64
          path: nucleotide-windows-x86_64.zip
          retention-days: 7
