name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_ref: ${{ steps.release.outputs.release_ref }}
      release_sha: ${{ steps.verify.outputs.release_sha }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Resolve release tag
        id: release
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${REQUESTED_TAG}"
          else
            version="${GITHUB_REF#refs/tags/}"
          fi

          if ! printf '%s' "${version}" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Invalid release tag: ${version}" >&2
            exit 1
          fi

          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"
          printf 'release_ref=refs/tags/%s\n' "${version}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ steps.release.outputs.release_ref }}
          fetch-depth: 0

      - name: Verify release ref
        id: verify
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          tag_sha="$(git rev-list -n 1 "${RELEASE_VERSION}^{commit}")"
          head_sha="$(git rev-parse HEAD)"

          if [ "${head_sha}" != "${tag_sha}" ]; then
            echo "Checked out ${head_sha}, but ${RELEASE_VERSION} resolves to ${tag_sha}" >&2
            exit 1
          fi

          printf 'release_sha=%s\n' "${head_sha}" >> "${GITHUB_OUTPUT}"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare-release
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-release.outputs.release_ref }}
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            libfreetype6-dev \
            libfontconfig1-dev
      
      - name: Build release
        run: |
          cargo build --release -p nucleotide --bins -p nucleotide-remote
          nix develop --command build-remote-helpers
      
      - name: Prepare distribution
        run: |
          # Fetch the Cargo-pinned Helix revision for runtime files.
          HELIX_REV="$(sed -n 's/.*helix-loader = .*rev = "\([0-9a-f]*\)".*/\1/p' Cargo.toml | head -n 1)"
          test -n "${HELIX_REV}"
          git init helix-temp
          git -C helix-temp remote add origin https://github.com/helix-editor/helix.git
          git -C helix-temp fetch --depth 1 origin "${HELIX_REV}"
          git -C helix-temp checkout --detach FETCH_HEAD
          
          # Create distribution
          mkdir -p nucleotide-linux/bin
          mkdir -p nucleotide-linux/share/nucleotide/runtime
          mkdir -p target/remote-helpers
          
          cp target/release/nucl nucleotide-linux/bin/
          cp target/release/nucleotide-remote nucleotide-linux/bin/nucleotide-remote
          cp target/remote-helpers/nucleotide-remote-linux-x86_64 nucleotide-linux/bin/
          cp target/remote-helpers/nucleotide-remote-linux-aarch64 nucleotide-linux/bin/
          cp -r helix-temp/runtime/* nucleotide-linux/share/nucleotide/runtime/
          cp README.md LICENSE nucleotide-linux/ 2>/dev/null || true
          
          # Create tarball
          tar czf nucleotide-linux-x86_64.tar.gz nucleotide-linux
          
          rm -rf helix-temp
      
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-build
          path: nucleotide-linux-x86_64.tar.gz

      - name: Upload Linux remote helpers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-remote-helpers
          path: target/remote-helpers/nucleotide-remote-linux-*

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [prepare-release, build-linux]
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
          - arch: aarch64
            target: aarch64-apple-darwin
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Download Linux remote helpers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: linux-remote-helpers
          path: target/remote-helpers

      - name: Verify Linux remote helpers
        run: |
          test -f target/remote-helpers/nucleotide-remote-linux-x86_64
          test -f target/remote-helpers/nucleotide-remote-linux-aarch64
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2
      
      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}
      
      - name: Prepare runtime
        run: |
          HELIX_REV="$(sed -n 's/.*helix-loader = .*rev = "\([0-9a-f]*\)".*/\1/p' Cargo.toml | head -n 1)"
          test -n "${HELIX_REV}"
          git init helix-temp
          git -C helix-temp remote add origin https://github.com/helix-editor/helix.git
          git -C helix-temp fetch --depth 1 origin "${HELIX_REV}"
          git -C helix-temp checkout --detach FETCH_HEAD
          mkdir -p runtime
          cp -r helix-temp/runtime/* runtime/
          rm -rf helix-temp
      
      - name: Create app bundle
        run: |
          chmod +x scripts/bundle-mac.sh
          NUCL_REMOTE_HELPER_DIR="target/remote-helpers" \
            NUCL_REQUIRE_REMOTE_HELPERS=1 \
            NUCL_BINARY="target/${{ matrix.target }}/release/nucl" \
            ./scripts/bundle-mac.sh

          tar -czf Nucleotide-${{ matrix.arch }}.app.tar.gz Nucleotide.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-${{ matrix.arch }}-app
          path: Nucleotide-${{ matrix.arch }}.app.tar.gz

  build-macos-universal:
    name: Build macOS Universal
    runs-on: macos-latest
    needs: [prepare-release, build-macos]
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-release.outputs.release_ref }}
      
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: macos-x86_64-app
          path: x86_64
      
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: macos-aarch64-app
          path: aarch64

      - name: Install .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: |
          dotnet tool update -g vpk
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      
      - name: Create universal binary
        run: |
          tar -xzf x86_64/Nucleotide-x86_64.app.tar.gz
          mv Nucleotide.app Nucleotide-x86_64.app

          tar -xzf aarch64/Nucleotide-aarch64.app.tar.gz
          mv Nucleotide.app Nucleotide-aarch64.app
          
          # Create universal app
          cp -r Nucleotide-x86_64.app Nucleotide.app
          lipo -create \
            Nucleotide-x86_64.app/Contents/MacOS/Nucleotide \
            Nucleotide-aarch64.app/Contents/MacOS/Nucleotide \
            -output Nucleotide.app/Contents/MacOS/Nucleotide
          test -x Nucleotide.app/Contents/MacOS/nucleotide-remote-linux-x86_64
          test -x Nucleotide.app/Contents/MacOS/nucleotide-remote-linux-aarch64

      - name: Build macOS Velopack package
        run: |
          chmod +x scripts/package-velopack.sh
          NUCL_VELOPACK_VERSION="${{ needs.prepare-release.outputs.version }}" \
            NUCL_VELOPACK_PACK_DIR="Nucleotide.app" \
            NUCL_VELOPACK_OUTPUT_DIR="target/release/bundle/velopack-macos" \
            NUCL_VELOPACK_PACK_ID="org.spiralpoint.nucleotide.macos" \
            NUCL_VELOPACK_CHANNEL="macos" \
            NUCL_VELOPACK_RUNTIME="" \
            ./scripts/package-velopack.sh

          test -f target/release/bundle/velopack-macos/releases.macos.json
          test -n "$(find target/release/bundle/velopack-macos -maxdepth 1 -name '*-full.nupkg' -print -quit)"
      
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-velopack
          path: target/release/bundle/velopack-macos/*

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [prepare-release, build-linux]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Download Linux remote helpers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: linux-remote-helpers
          path: target/remote-helpers

      - name: Verify Linux remote helpers
        shell: pwsh
        run: |
          foreach ($helper in @("nucleotide-remote-linux-x86_64", "nucleotide-remote-linux-aarch64")) {
            $path = Join-Path "target\remote-helpers" $helper
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Linux remote helper not found: $path"
            }
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Install .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          dotnet tool update -g vpk
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p nucleotide --bins

      - name: Prepare bundled runtime
        shell: pwsh
        run: |
          .\scripts\clone-helix-runtime.ps1 -Destination helix-temp
          try {
            .\scripts\setup-windows-runtime.ps1 -RuntimeSource helix-temp\runtime -NuclExe target\release\nucl-grammar.exe -AllowGrammarFailures
          } finally {
            Remove-Item -LiteralPath helix-temp -Recurse -Force
          }

      - name: Build Windows Velopack package
        shell: pwsh
        run: |
          .\scripts\package-velopack.ps1 `
            -Version "${{ needs.prepare-release.outputs.version }}" `
            -OutputDir "target\release\bundle\velopack-windows" `
            -PackId "org.spiralpoint.nucleotide.windows" `
            -Channel "windows" `
            -Runtime "win-x64" `
            -RequireRemoteHelpers

          if (-not (Test-Path "target\release\bundle\velopack-windows\releases.windows.json" -PathType Leaf)) {
            throw "Velopack Windows release feed was not created."
          }
          if (-not (Get-ChildItem "target\release\bundle\velopack-windows" -Filter "*-full.nupkg" -File | Select-Object -First 1)) {
            throw "Velopack Windows full package was not created."
          }
          if (-not (Get-ChildItem "target\release\bundle\velopack-windows" -Filter "*Setup.exe" -File | Select-Object -First 1)) {
            throw "Velopack Windows setup executable was not created."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-build
          path: target/release/bundle/velopack-windows/*

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-linux, build-macos-universal, build-windows]
    permissions:
      actions: read
      contents: write
      attestations: write
      id-token: write
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-release.outputs.release_ref }}
      
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
      
      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/linux-build/nucleotide-linux-x86_64.tar.gz release/
          find artifacts/macos-velopack -maxdepth 1 -type f -exec cp {} release/ \;
          find artifacts/windows-build -maxdepth 1 -type f -exec cp {} release/ \;
          cp artifacts/linux-remote-helpers/nucleotide-remote-linux-* release/
          
          # Generate checksums
          cd release
          sha256sum * > SHA256SUMS
          cd ..
          
          echo "Release files:"
          ls -lh release/

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: release/*
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          name: Nucleotide ${{ needs.prepare-release.outputs.version }}
          body: |
            ## Downloads
            
            ### macOS
            - **Velopack installer/update feed:** `org.spiralpoint.nucleotide.macos*`, `releases.macos.json`
            
            ### Linux
            - **x86_64:** `nucleotide-linux-x86_64.tar.gz`
            - **SSH remote helpers:** `nucleotide-remote-linux-x86_64`, `nucleotide-remote-linux-aarch64`

            ### Windows
            - **Velopack installer/update feed:** `org.spiralpoint.nucleotide.windows*`, `releases.windows.json`
            
            ## Installation
            
            ### macOS
            1. Download the macOS Velopack installer package.
            2. Run the installer.
            
            ### Linux
            1. Download and extract the tarball:
               ```bash
               tar xzf nucleotide-linux-x86_64.tar.gz
               cd nucleotide-linux
               ```
            2. Add to PATH or run directly:
               ```bash
               ./bin/nucl
               ```

            ### Windows
            1. Download the Windows Velopack setup executable.
            2. Run the installer and launch Nucleotide from the Start Menu or desktop shortcut.
            3. The installer includes the bundled Helix runtime and compiled Windows grammar DLLs.
            
            ## Checksums
            SHA256 checksums are available in `SHA256SUMS`
          draft: true
          files: release/*
